name: CI - Database Schema Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-schema:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check schema.sql is up to date
      run: bash scripts/check_schema_up_to_date.sh

    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          pg_isready -h localhost -p 5432 -U postgres && break
          echo "Waiting for PostgreSQL..."
          sleep 1
        done

    - name: Install pgTAP in container
      env:
        PGPASSWORD: postgres
      run: |
        container_id=$(docker ps -q --filter "ancestor=postgres:16-alpine")
        docker exec "$container_id" sh -c "
          apk add --no-cache git build-base postgresql16-dev perl-dev perl-app-cpanminus && \
          cd /tmp && \
          git clone https://github.com/theory/pgtap.git && \
          cd pgtap && \
          make && make install
        "

    - name: Create pgTAP extension
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -p 5432 -U postgres -c "CREATE EXTENSION IF NOT EXISTS pgtap;"

    - name: Create test database
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -p 5432 -U postgres -c "CREATE DATABASE personalbase_ci;"

    - name: Import schema and run smoke tests
      env:
        PGPASSWORD: postgres
      run: |
        echo "=== Importing schema.sql ==="
        psql --set ON_ERROR_STOP=on \
             -h localhost -p 5432 -U postgres \
             -d personalbase_ci \
             -f schema.sql
        echo "=== Database import complete ==="
        
        echo "=== Running smoke tests ==="
        psql -h localhost -p 5432 -U postgres -d personalbase_ci \
             -f scripts/schema_smoke_tests.sql

    - name: Run pgTAP unit tests
      env:
        PGPASSWORD: postgres
        PGHOST: localhost
        PGPORT: 5432
        PGUSER: postgres
        PGDATABASE: personalbase_ci
      run: |
        echo "=== Running pgTAP tests with psql ==="
        # Run each test file individually and show results
        failed=0
        for test_file in tests/pgtap/*.pg; do
          echo ""
          echo "Running: $test_file"
          if ! psql -h localhost -p 5432 -U postgres -d personalbase_ci -f "$test_file" 2>&1; then
            echo "WARNING: $test_file had issues"
            failed=1
          fi
        done
        echo ""
        echo "=== pgTAP test run complete ==="
        exit $failed

    - name: Schema validation summary
      if: always()
      env:
        PGPASSWORD: postgres
      run: |
        echo "=== Schema Validation Summary ==="
        echo "Tables: $(psql -h localhost -p 5432 -U postgres -d personalbase_ci -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema IN ('course', 'finance', 'habits', 'todo', 'trips', 'user');" 2>/dev/null | xargs)"
        echo "Schemas: $(psql -h localhost -p 5432 -U postgres -d personalbase_ci -t -c "SELECT count(*) FROM information_schema.schemata WHERE table_schema IN ('course', 'finance', 'habits', 'todo', 'trips', 'user');" 2>/dev/null | xargs)"
        echo "Functions: $(psql -h localhost -p 5432 -U postgres -d personalbase_ci -t -c "SELECT count(*) FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace WHERE n.nspname IN ('course', 'finance', 'habits', 'todo', 'trips', 'user');" 2>/dev/null | xargs)"
        echo "Views: $(psql -h localhost -p 5432 -U postgres -d personalbase_ci -t -c "SELECT count(*) FROM information_schema.views WHERE table_schema IN ('course', 'finance', 'habits', 'todo', 'trips', 'user');" 2>/dev/null | xargs)"
        echo "=== CI COMPLETE ==="
